<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swipe Chat | Official Info</title>
    <meta
      name="description"
      content="Swipe Chat の公式情報ページです。サポート窓口とプライバシーポリシーを掲載しています。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card">
        <p class="eyebrow">Swipe Chat</p>
        <h1>公式情報ページ</h1>
        <p class="lead">
          Swipe Chat は、気持ちやひとことをシェアしながら会話を始められる
          18歳以上向けのコミュニティアプリです。
        </p>
        <div class="hero-actions">
          <a class="primary-link" href="./privacy.html">プライバシーポリシー</a>
          <a class="secondary-link" href="./support.html">サポート</a>
        </div>
      </section>

      <section class="grid">
        <article class="info-card">
          <h2>ご利用に関する案内</h2>
          <ul class="plain-list">
            <li>18歳未満の方は利用できません。</li>
            <li>出会いを主目的とした利用は禁止しています。</li>
            <li>通報、ブロック、アカウント削除機能を用意しています。</li>
            <li>不適切な利用が確認された場合は停止対応を行うことがあります。</li>
          </ul>
        </article>

        <article class="info-card">
          <h2>公開ページ</h2>
          <ul class="link-list">
            <li><a href="./privacy.html">Privacy Policy</a></li>
            <li><a href="./support.html">Support</a></li>
          </ul>
        </article>
      </section>
    </main>
